<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Multi-Timezone Digital Clock</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            text-align: center;\n            padding: 50px;\n        }\n        .clock {\n            font-size: 2em;\n            margin: 20px;\n        }\n        .toggle {\n            margin: 20px;\n        }\n    </style>\n</head>\n<body>\n    <h1>Multi-Timezone Digital Clock</h1>\n    <div class="toggle">\n        <button onclick="toggleFormat()">Toggle 12/24 Hour Format</button>\n    </div>\n    <div class="clock" id="clock"></div>\n    <script>\n        let is24HourFormat = true;\n        const timezones = ['UTC', 'America/New_York', 'Europe/London', 'Asia/Tokyo', 'Australia/Sydney'];\n        const clockDiv = document.getElementById('clock');\n\n        function updateTime() {\n            const timeStrings = timezones.map(tz => {\n                const date = new Date();\n                const options = {\n                    timeZone: tz,\n                    hour: is24HourFormat ? '2-digit' : 'numeric',\n                    minute: '2-digit',\n                    second: '2-digit',\n                    hour12: !is24HourFormat\n                };\n                const time = date.toLocaleTimeString([], options);\n                return `${tz}: ${time}`;\n            });\n            clockDiv.innerHTML = timeStrings.join('<br>');\n        }\n\n        function toggleFormat() {\n            is24HourFormat = !is24HourFormat;\n            updateTime();\n        }\n\n        setInterval(updateTime, 1000);\n        updateTime();\n    </script>\n</body>\n</html>
